name: Deploy docs website to GitHub Pages

on:
  push:
    branches: [ "master" ]
    paths:
      - "website/**"
      - "documents/src/commonMain/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate API docs
        uses: gradle/gradle-build-action@ce999babab2de1c4b649dc15f0ee67e6246c994f
        with:
          arguments: :documents:dokkaGenerateHtml
      - name: Copy API docs into site
        run: |
          rm -rf website/api
          cp -r documents/build/dokka/html website/api
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build site
        run: |
          node website/scripts/build.js
          node website/scripts/build-search-index.js
      - name: Check links
        run: node website/scripts/link-check.js
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
